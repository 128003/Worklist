<!DOCTYPE html>
<html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>骨科特殊測試庫 | 復健科臨床工具</title>
<link rel="stylesheet" href="style.css"></head>
<body><div class="wrap">
<a class="back" href="index.html">← 回工具箱首頁</a>
<h1>🔍 骨科特殊測試查詢庫</h1>
<div class="sub">依部位查詢常用理學特殊測試、操作方式摘要與敏感度/特異度參考值</div>
<div class="disclaimer">⚠️ Sn/Sp 數值因研究方法不同差異頗大，僅供臨床參考，單一測試陽性/陰性不應作為唯一診斷依據，請整合病史與其他檢查。</div>

<div class="card">
  <input type="text" id="searchBox" placeholder="搜尋測試名稱或部位，例如：肩、Lachman、半月板...">
</div>

<div id="resultsArea"></div>
<footer>僅供醫療教育用途 · 文獻數值僅供參考</footer>
</div>

<script>
const TESTS = [
  {region:"肩", name:"Neer Test", desc:"檢查者被動將病人手臂內轉前屈至最大角度，誘發肩峰下夾擠疼痛", target:"肩峰下夾擠症候群", sn:"75-89%", sp:"31-51%"},
  {region:"肩", name:"Hawkins-Kennedy Test", desc:"肩屈曲90度、肘屈曲90度，檢查者將肩內轉，誘發夾擠疼痛", target:"肩峰下夾擠症候群", sn:"79-92%", sp:"25-44%"},
  {region:"肩", name:"Empty Can Test (Jobe)", desc:"肩外展90度、水平內收30度、內轉（拇指朝下），抗阻力測試棘上肌", target:"棘上肌病變/撕裂", sn:"44-90%", sp:"50-98%"},
  {region:"肩", name:"O'Brien Test (Active Compression)", desc:"肩前屈90度、內收10-15度、內轉，抗阻力向下；再外轉重複，比較疼痛", target:"SLAP病灶/AC關節病變", sn:"54-100%", sp:"31-91%"},
  {region:"肩", name:"Speed's Test", desc:"肩屈曲90度、肘伸直、前臂旋後，抗阻力前屈", target:"二頭肌長頭肌腱病變", sn:"32-90%", sp:"14-83%"},
  {region:"肩", name:"Apprehension Test", desc:"肩外展90度、外轉至最大角度，病人出現恐懼感/抗拒", target:"前向肩關節不穩", sn:"32-72%", sp:"57-99%"},
  {region:"肩", name:"Sulcus Sign", desc:"手臂自然下垂，向下牽引肱骨，觀察肩峰下凹陷", target:"下向/多方向肩關節不穩", sn:"28-72%", sp:"56-93%"},
  {region:"肘", name:"Cozen's Test", desc:"肘伸直，前臂旋前，抗阻力伸腕，誘發外上髁疼痛", target:"網球肘（外上髁炎）", sn:"高（具體數值文獻不一）", sp:"中等"},
  {region:"肘", name:"Mill's Test", desc:"被動腕屈曲、前臂旋前、肘伸直，誘發外上髁疼痛", target:"網球肘（外上髁炎）", sn:"中等", sp:"中等"},
  {region:"腕/手", name:"Tinel's Sign (Wrist)", desc:"輕敲腕部正中神經處，誘發手指麻刺感", target:"腕隧道症候群", sn:"23-67%", sp:"40-94%"},
  {region:"腕/手", name:"Phalen's Test", desc:"雙腕屈曲90度互靠60秒，誘發手指麻刺感", target:"腕隧道症候群", sn:"42-85%", sp:"54-98%"},
  {region:"腕/手", name:"Finkelstein Test", desc:"拇指握於掌心，腕部尺偏，誘發橈側疼痛", target:"De Quervain's 狹窄性肌腱滑膜炎", sn:"中高", sp:"中等"},
  {region:"髖", name:"FABER Test (Patrick's)", desc:"髖屈曲外展外轉成4字形，誘發鼠蹊或薦髂關節疼痛", target:"髖關節病變/薦髂關節功能障礙", sn:"42-89%", sp:"18-100%"},
  {region:"髖", name:"FADIR Test", desc:"髖屈曲內收內轉，誘發鼠蹊深處疼痛", target:"髖關節夾擠（FAI）/盂唇病變", sn:"75-99%", sp:"8-43%"},
  {region:"髖", name:"Trendelenburg Test", desc:"單腳站立，觀察對側骨盆是否下垂", target:"臀中肌無力/功能障礙", sn:"中等", sp:"中等"},
  {region:"膝", name:"Lachman Test", desc:"膝屈曲20-30度，固定股骨、拉動脛骨向前，比較位移與終末感", target:"前十字韌帶斷裂", sn:"85-99%", sp:"85-99%"},
  {region:"膝", name:"Anterior Drawer Test", desc:"膝屈曲90度，向前拉動脛骨", target:"前十字韌帶斷裂", sn:"22-92%", sp:"71-100%"},
  {region:"膝", name:"Posterior Drawer Test", desc:"膝屈曲90度，向後推脛骨", target:"後十字韌帶斷裂", sn:"22-98%", sp:"97-100%"},
  {region:"膝", name:"McMurray Test", desc:"膝屈曲後旋轉脛骨同時伸直，誘發喀聲或疼痛", target:"半月板撕裂", sn:"55-70%", sp:"59-97%"},
  {region:"膝", name:"Thessaly Test", desc:"單腳站立屈膝20度，旋轉身體3次，誘發疼痛或卡住感", target:"半月板撕裂", sn:"66-92%", sp:"56-96%"},
  {region:"膝", name:"Valgus Stress Test", desc:"膝屈曲20-30度，施加外翻應力", target:"內側副韌帶（MCL）損傷", sn:"86-96%", sp:"49%"},
  {region:"膝", name:"Varus Stress Test", desc:"膝屈曲20-30度，施加內翻應力", target:"外側副韌帶（LCL）損傷", sn:"中等", sp:"中等"},
  {region:"踝", name:"Anterior Drawer Test (Ankle)", desc:"固定脛骨，向前拉動跟骨/距骨", target:"距腓前韌帶（ATFL）損傷", sn:"58-96%", sp:"55-100%"},
  {region:"踝", name:"Talar Tilt Test", desc:"踝關節中立位，施加內翻應力觀察距骨傾斜", target:"距腓前韌帶/跟腓韌帶損傷", sn:"中等", sp:"中等"},
  {region:"踝", name:"Squeeze Test", desc:"於小腿中段擠壓脛腓骨，誘發遠端疼痛", target:"高位踝關節扭傷（脛腓聯合損傷）", sn:"中低", sp:"中高"},
  {region:"脊椎", name:"Straight Leg Raise (SLR)", desc:"病人平躺，被動抬高下肢至誘發坐骨神經放射痛", target:"腰椎椎間盤突出合併神經根壓迫", sn:"91%", sp:"26%"},
  {region:"脊椎", name:"Slump Test", desc:"坐姿駝背、頸屈曲、伸膝、踝背屈，誘發神經張力症狀", target:"神經根張力增加/椎間盤病變", sn:"84-100%", sp:"低-中"},
  {region:"脊椎", name:"Spurling's Test", desc:"頸後仰並側彎、向下加壓，誘發同側上肢放射痛", target:"頸椎神經根病變", sn:"40-97%", sp:"60-100%"},
];

function render(filter=''){
  const f = filter.trim().toLowerCase();
  const filtered = TESTS.filter(t => !f || t.region.toLowerCase().includes(f) || t.name.toLowerCase().includes(f) || t.target.toLowerCase().includes(f));
  const grouped = {};
  filtered.forEach(t=>{ (grouped[t.region] = grouped[t.region] || []).push(t); });
  const area = document.getElementById('resultsArea');
  if(filtered.length === 0){ area.innerHTML = '<div class="card sub">查無符合結果</div>'; return; }
  area.innerHTML = Object.entries(grouped).map(([region, list])=>`
    <div class="card">
      <div class="section-title">${region}（${list.length}）</div>
      ${list.map(t=>`
        <div class="row" style="display:block;">
          <div class="item-name">${t.name}</div>
          <div class="item-sub">${t.desc}</div>
          <div style="margin-top:6px;">
            <span class="pill">目標：${t.target}</span>
            <span class="pill">Sn ${t.sn}</span>
            <span class="pill">Sp ${t.sp}</span>
          </div>
        </div>`).join('')}
    </div>`).join('');
}

document.getElementById('searchBox').addEventListener('input', e=> render(e.target.value));
render();
</script>
</body></html>
