<!DOCTYPE html>
<html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>兒童發展評估 | 復健科臨床工具</title>
<link rel="stylesheet" href="style.css">
<style>
  .maintab{border:none;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 20px;font-size:14px;font-weight:800;cursor:pointer;}
  .maintab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent;}
  .field-row{margin-bottom:10px;}
  .field-row label{font-size:12.5px;color:var(--sub);font-weight:600;display:block;margin-bottom:4px;}
  .ladder-item{background:var(--accent-light);border-radius:12px;padding:16px;text-align:center;}
  .ladder-item .age{font-size:12px;color:var(--accent2);font-weight:700;}
  .ladder-item .label{font-size:15px;font-weight:700;margin:6px 0;}
  .ladder-actions{display:flex;gap:10px;justify-content:center;margin-top:10px;}
  .pass-btn{background:var(--good);color:#fff;border:none;border-radius:10px;padding:9px 22px;font-weight:700;cursor:pointer;}
  .fail-btn{background:var(--bad);color:#fff;border:none;border-radius:10px;padding:9px 22px;font-weight:700;cursor:pointer;}
  .ladder-history{font-size:12px;color:var(--sub);margin-top:10px;}
  .ladder-history .hrow{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px dashed var(--line);}
  .domain-pill{border:1px solid var(--line);background:#fff;border-radius:20px;padding:7px 14px;font-size:12.5px;font-weight:700;cursor:pointer;}
  .domain-pill.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .domain-pill.done{border-color:var(--good);color:var(--good);}
  .dx-item{border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;}
  .dx-item.selected{border-color:var(--accent);background:var(--accent-light);}
  .dx-code{font-size:11px;color:var(--accent2);font-weight:800;}
  .dx-detail{font-size:12px;color:var(--sub);margin-top:6px;line-height:1.7;display:none;}
  .dx-item.expanded .dx-detail{display:block;}
</style>
</head>
<body><div class="wrap">
<a class="back" href="index.html">← 回工具箱首頁</a>
<h1>👶 兒童發展評估</h1>
<div class="sub">Subjective 病史 · Objective 年齡階梯式評估 · Assessment 常見診斷選單 — 可分段複製到病歷</div>
<div class="disclaimer">⚠️ 僅供臨床教育輔助參考，診斷準則為依使用者提供之整理筆記改編之精簡版，正式診斷請依 DSM-5 / ICD-10 原文準則並轉介完整評估。</div>

<div class="card">
  <div class="badge-row" id="mainTabs"></div>
</div>

<div id="subjectivePane"></div>
<div id="objectivePane" style="display:none;"></div>
<div id="assessmentPane" style="display:none;"></div>

<div class="card">
  <div class="section-title">📋 最終輸出</div>
  <div class="toolbar" style="margin:0;">
    <button class="action btn-primary" id="copyS">複製 Subjective</button>
    <button class="action btn-primary" id="copyO">複製 Objective</button>
    <button class="action btn-primary" id="copyA">複製 Assessment</button>
    <button class="action btn-ghost" id="copyAll">複製全部</button>
  </div>
  <div class="saved-note" id="savedNote"></div>
</div>
<footer>僅供醫療教育用途 · 資料不上傳伺服器</footer>
</div>

<script src="common.js"></script>
<script>
/* ================= MAIN TABS ================= */
const MAIN_TABS = [{k:"s",label:"Subjective"},{k:"o",label:"Objective"},{k:"a",label:"Assessment"}];
let mainTab = 's';
function renderMainTabs(){
  document.getElementById('mainTabs').innerHTML = MAIN_TABS.map(t=>`<button class="maintab ${t.k===mainTab?'active':''}" data-k="${t.k}">${t.label}</button>`).join('');
  document.querySelectorAll('.maintab').forEach(b=>b.addEventListener('click', ()=>{
    mainTab = b.getAttribute('data-k'); renderMainTabs();
    document.getElementById('subjectivePane').style.display = mainTab==='s'?'block':'none';
    document.getElementById('objectivePane').style.display = mainTab==='o'?'block':'none';
    document.getElementById('assessmentPane').style.display = mainTab==='a'?'block':'none';
  }));
}

/* ================= SUBJECTIVE ================= */
const sBox = document.getElementById('subjectivePane');
sBox.innerHTML = `
<div class="card">
  <div class="section-title">基本資料</div>
  <div class="grid2">
    <div class="field-row"><label>年齡</label><input type="text" id="s_age" placeholder="例：2y3m"></div>
    <div class="field-row"><label>主訴 C.C.</label>
      <select id="s_cc"><option>構音不清 inaccurate articulation</option><option>語言發展遲緩 Speech delay</option><option>動作發展遲緩</option><option>整體發展遲緩</option><option>其他</option></select>
    </div>
  </div>
  <div class="field-row"><label>主訴補充（underlying / 其他描述）</label><textarea id="s_cc_note" placeholder="疾病背景、家長主訴細節..."></textarea></div>
</div>
<div class="card">
  <div class="section-title">出生史 Birth History</div>
  <div class="grid2">
    <div class="field-row"><label>G/P</label><input type="text" id="s_gp" placeholder="G1P1"></div>
    <div class="field-row"><label>週數</label><input type="text" id="s_ga" placeholder="38wk / full term"></div>
    <div class="field-row"><label>生產方式</label><input type="text" id="s_delivery" placeholder="NSD / C/S（理由）"></div>
    <div class="field-row"><label>出生體重 BBW (g)</label><input type="text" id="s_bbw" placeholder="例：3200（LBW<2500, VLBW<1500, ELBW<1000）"></div>
  </div>
  <div class="grid2">
    <div class="field-row"><label>週產期狀況</label><input type="text" id="s_perinatal" value="uneventful"></div>
    <div class="field-row"><label>住院史</label><input type="text" id="s_hosp" placeholder="無 / 描述"></div>
  </div>
  <div class="grid2">
    <div class="field-row"><label>門診追蹤</label><input type="text" id="s_opd" placeholder=""></div>
    <div class="field-row"><label>視力/聽力</label><input type="text" id="s_vh" value="normal/normal"></div>
  </div>
</div>
<div class="card">
  <div class="section-title">家庭 Family</div>
  <div class="grid2">
    <div class="field-row"><label>父親年齡/學歷/工作</label><input type="text" id="s_father" placeholder="35y / 大學 / 工程師"></div>
    <div class="field-row"><label>母親年齡/學歷/工作</label><input type="text" id="s_mother" placeholder="33y / 大學 / 家管"></div>
  </div>
  <div class="grid2">
    <div class="field-row"><label>兄弟姐妹</label><input type="text" id="s_sibling" placeholder=""></div>
    <div class="field-row"><label>主要照顧者</label>
      <select id="s_caregiver"><option>父母</option><option>保母（日間）</option><option>保母（夜間）</option><option>保母（24hr）</option><option>保母（上班日）</option><option>祖父母</option></select>
    </div>
  </div>
  <div class="field-row"><label>互動方式</label>
    <select id="s_interaction" multiple style="height:80px;">
      <option>basic care</option><option>陪玩看書</option><option>regularly</option><option>親子館</option><option>公園</option>
    </select>
  </div>
</div>
<div class="card">
  <div class="section-title">發展里程碑 Developmental Milestones</div>
  <div class="field-row"><label>粗動作 GM</label><input type="text" id="s_gm" placeholder="sit without support at__, stand at__, walk at__, jump at__, stair at__"></div>
  <div class="field-row"><label>精細動作 FM</label><input type="text" id="s_fm" placeholder="grasp at__, pincer grasp at__, throw ball/piling up at__, turn book page at__"></div>
  <div class="field-row"><label>語言 Speech</label><input type="text" id="s_speech" placeholder="first word at__, phrase & short sentences at__"></div>
</div>
<div class="card">
  <div class="section-title">學校／早療 School / Early Intervention</div>
  <div class="field-row"><label>就學情形</label><input type="text" id="s_school" placeholder="公幼/私幼/普通班/資源班/融合班..."></div>
  <div class="field-row"><label>學校表現（學業/體育）</label><input type="text" id="s_school_perf" placeholder=""></div>
  <div class="field-row"><label>定期早療</label><input type="text" id="s_ei" placeholder="目前接受之早療項目與頻率"></div>
</div>
`;
function buildSubjectiveText(){
  const v = id => document.getElementById(id)?.value || '';
  const lines = [];
  lines.push(`# Subjective`);
  lines.push(`[年齡：${v('s_age')}], come with ${v('s_cc')}${v('s_cc_note')?'（'+v('s_cc_note')+'）':''}`);
  lines.push('');
  lines.push(`[Birth History]`);
  lines.push(`${v('s_gp')}, ${v('s_ga')}, ${v('s_delivery')}`);
  lines.push(`BBW: ${v('s_bbw')}g`);
  lines.push(`Perinatal history: ${v('s_perinatal')}`);
  lines.push(`Hospitalization: ${v('s_hosp')}`);
  lines.push(`OPD follow-up: ${v('s_opd')}`);
  lines.push(`視力/聽力: ${v('s_vh')}`);
  lines.push('');
  lines.push(`[Family]`);
  lines.push(`Father: ${v('s_father')}`);
  lines.push(`Mother: ${v('s_mother')}`);
  lines.push(`兄弟姐妹: ${v('s_sibling')}`);
  lines.push(`Caregiver: ${v('s_caregiver')}`);
  const interactSel = Array.from(document.getElementById('s_interaction').selectedOptions).map(o=>o.value).join(', ');
  lines.push(`如何帶: ${interactSel}`);
  lines.push('');
  lines.push(`[Developmental milestones]`);
  lines.push(`GM: ${v('s_gm')}`);
  lines.push(`FM: ${v('s_fm')}`);
  lines.push(`Speech: ${v('s_speech')}`);
  lines.push('');
  lines.push(`[School/early intervention]`);
  lines.push(`School: ${v('s_school')}`);
  lines.push(`School performance: ${v('s_school_perf')}`);
  lines.push(`Regular early intervention: ${v('s_ei')}`);
  return lines.join('\n');
}

/* ================= OBJECTIVE — 年齡階梯式評估 ================= */
// 每個 domain: 依年齡(月)由小到大排序的項目
const DOMAINS = {
  "粗動作 Gross Motor": [
    {age:2,label:"抬頭（俯臥）"},{age:3.5,label:"頭控穩定"},{age:4,label:"手肘撐"},{age:4,label:"翻一半/側翻"},
    {age:5,label:"仰躺變趴姿"},{age:6,label:"手掌撐"},{age:6,label:"趴姿變仰躺"},{age:7,label:"坐姿手撐"},
    {age:7.5,label:"手腳交替爬"},{age:8,label:"坐得穩"},{age:9,label:"拉著坐到站"},{age:10.5,label:"扶站/扶走"},
    {age:13,label:"獨立走"},{age:13.5,label:"爬樓梯"},{age:16.5,label:"牽手上樓梯"},{age:18,label:"獨立坐到站/蹲"},
    {age:21,label:"扶手上下樓梯"},{age:24,label:"跑"},{age:27,label:"雙腳跳"},{age:36,label:"樓梯不扶獨立上下"},
    {age:36,label:"上樓梯跨階"},{age:48,label:"單腳站3秒/單腳跳2下"},{age:48,label:"下樓梯跨階"},{age:60,label:"單腳站5-10秒/單腳跳5下"},
  ],
  "精細動作 Fine Motor": [
    {age:2,label:"手打開"},{age:3,label:"手到嘴/抓物搖晃"},{age:6,label:"整隻手掌撈（raking）"},
    {age:9,label:"拇指食指指腹夾（crude pincer）"},{age:12,label:"拇指食指指尖夾（mature pincer）"},
    {age:15,label:"手指抓食物入口"},{age:15,label:"手掌抓筆"},{age:18,label:"堆積木2個"},{age:18,label:"塗鴉"},
    {age:18,label:"脫襪子"},{age:18,label:"丟球（平推）"},{age:20,label:"完成簡單形狀板（3塊）"},
    {age:24,label:"2塊拼圖"},{age:24,label:"堆積木4-6個"},{age:24,label:"畫直線"},{age:24,label:"湯匙/杯子使用"},
    {age:30,label:"脫鬆緊褲"},{age:36,label:"堆積木10個"},{age:36,label:"畫圓"},
    {age:36,label:"三/四點式握筆（手肘手腕移動為主）"},{age:36,label:"穿褲子"},{age:48,label:"畫十字"},
    {age:48,label:"過肩丟球"},{age:54,label:"畫正方形"},{age:54,label:"接球"},{age:60,label:"畫三角形或人"},
    {age:66,label:"動態三點式握筆（手指移動為主）"},{age:72,label:"畫菱形"},
  ],
  "語言 Language": [
    {age:2.5,label:"咕咕聲（cooing）"},{age:5,label:"牙牙學語（babble）"},{age:9,label:"以動作表達需求／理解「不」"},
    {age:12,label:"叫爸爸媽媽/對名字有反應"},{age:15,label:"用手指表達需求"},
    {age:18,label:"5-10個單字/部分身體部位/簡單指令"},{age:24,label:"兩字詞/50個單字/單步驟指令"},
    {age:30,label:"使用代名詞（你我他）"},{age:36,label:"簡單來回對話/說出名字年紀性別"},
    {age:48,label:"敘述事件/複述短故事"},{age:60,label:"完整敘述故事或圖片內容/簡單人際關係/數字"},
  ],
  "認知 Cognition": [
    {age:2,label:"視覺追視"},{age:4,label:"看著自己的手（手眼協調）"},{age:6,label:"伸手抓玩具"},
    {age:5.5,label:"部分遮住仍會找（物體恆存）"},{age:7.5,label:"玩躲貓貓"},{age:10,label:"物品移到B仍去A找"},
    {age:9,label:"感覺動作式玩法（搖敲拍丟）"},{age:10.5,label:"容器玩法（放入/倒出）"},
    {age:16.5,label:"功能性玩法（拿湯匙餵娃娃）"},{age:18,label:"1個形狀配對"},{age:20,label:"3塊形狀板"},
    {age:21,label:"簡單假扮遊戲（假裝打電話）"},{age:24,label:"圖片/顏色配對"},{age:24,label:"2塊拼圖"},
    {age:30,label:"兩步驟指令"},{age:30,label:"象徵性遊戲（玩具車代表車）"},{age:36,label:"認得一種顏色/大小概念"},
    {age:48,label:"說出基本顏色/數到5/方向"},{age:48,label:"角色扮演遊戲（扮醫生老師）"},
    {age:60,label:"說出數字名稱/數到10/說出日期/注意力10分鐘"},
  ],
  "社會心理/遊戲 Psychosocial/Play": [
    {age:1,label:"注視臉孔"},{age:3,label:"對人微笑"},{age:4,label:"認得熟悉臉孔"},{age:5,label:"拉玩具會抵抗"},
    {age:6,label:"笑出聲"},{age:6,label:"認得家人"},{age:6.5,label:"怕生/分離焦慮開始"},{age:8,label:"玩躲貓貓"},
    {age:12,label:"揮手再見"},{age:12,label:"模仿動作"},{age:12,label:"怕生（高峰）"},{age:15,label:"互動遊戲（擊掌）"},
    {age:18,label:"回應呼喚名字/簡單假扮/與父母分享/搶玩具/照鏡子"},{age:24,label:"模仿/較獨立有主見/對其他小孩有興趣"},
    {age:24,label:"獨自玩（solitary play）"},{age:24,label:"與其他小孩有些分享"},
    {age:36,label:"角色扮演/輪流/關心他人/情緒更多"},{age:36,label:"平行遊戲（parallel play）"},
    {age:36,label:"簡短團體遊戲"},{age:36,label:"大小便訓練"},
    {age:48,label:"簡單規則遊戲或角色扮演/能坐著上課/情緒穩定"},{age:48,label:"合作遊戲（cooperative play）"},
    {age:60,label:"規則遊戲/豐富角色扮演/輪流/注意力>10分鐘"},
  ],
  "構音 Articulation": [
    {age:36,label:"ㄅㄇㄉㄋㄍㄏ（爸爸媽媽買蛋糕喝牛奶）"},{age:48,label:"ㄆㄊㄎㄌㄈㄐ（跑跑跳跳快樂飛機）"},
    {age:54,label:"ㄒㄑ（小企鵝）"},{age:60,label:"ㄗㄙ（早安禮拜三）"},{age:66,label:"ㄘ（草莓）"},
    {age:72,label:"ㄓㄔㄕㄖ（蜘蛛樹上吃肉肉）"},
  ],
  "聲音/言語 Speech": [
    {age:2,label:"笑聲（laugh sound）"},{age:3,label:"尖叫（scream）"},{age:5,label:"轉頭看聲音來源"},
    {age:6,label:"發出母音聲"},{age:6,label:"無意義疊音（吧媽噠等）"},{age:9,label:"理解「不」"},
    {age:12,label:"有意義使用爸媽/對名字有反應"},
  ],
  "聽理解 Comprehension": [
    {age:18,label:"聽懂至少1個五官部位/部分簡單指令"},{age:24,label:"聽懂yes/no問句/單步驟指令/指認至少一種圖卡"},
    {age:36,label:"聽懂兩步驟指令"},{age:48,label:"聽懂三步驟以上指令"},
  ],
  "表達 Expression": [
    {age:18,label:"正確叫爸媽/說出10個字/能用手指比出需求"},{age:24,label:"指認圖片/哼兒歌/連詞短句"},
    {age:36,label:"4-5詞句子/問問題/回答年齡性別名字/代名詞"},{age:48,label:"完整句子/敘述部分故事/問為什麼"},
    {age:60,label:"開放式問答/敘述完整故事"},
  ],
};
Object.values(DOMAINS).forEach(arr=> arr.sort((a,b)=>a.age-b.age));

let childAgeMonths = null;
let domainState = {}; // {domainName: {idx, history:[{label,age,result}]}}
let currentDomain = Object.keys(DOMAINS)[0];

const oBox = document.getElementById('objectivePane');
oBox.innerHTML = `
<div class="card">
  <div class="section-title">輸入小孩年齡</div>
  <div class="grid2">
    <div><div class="item-sub">年</div><input type="number" id="o_years" min="0" placeholder="0"></div>
    <div><div class="item-sub">月</div><input type="number" id="o_months" min="0" max="11" placeholder="0"></div>
  </div>
  <button class="action btn-primary" style="margin-top:10px;" id="o_start">開始評估（依年齡從相近項目起測）</button>
</div>
<div class="card" id="domainTabsCard" style="display:none;">
  <div class="section-title">領域</div>
  <div class="badge-row" id="domainTabs"></div>
</div>
<div class="card" id="ladderCard" style="display:none;"></div>
`;
document.getElementById('o_start').addEventListener('click', ()=>{
  const y = parseInt(document.getElementById('o_years').value)||0;
  const m = parseInt(document.getElementById('o_months').value)||0;
  childAgeMonths = y*12+m;
  domainState = {};
  Object.keys(DOMAINS).forEach(d=>{
    const items = DOMAINS[d];
    let startIdx = items.findIndex(it=> it.age > childAgeMonths);
    if(startIdx === -1) startIdx = items.length-1;
    else if(startIdx>0) startIdx = startIdx-1; // 取最接近且不超過年齡的項目
    domainState[d] = {idx:startIdx, history:[]};
  });
  document.getElementById('domainTabsCard').style.display='block';
  document.getElementById('ladderCard').style.display='block';
  renderDomainTabs();
  renderLadder();
});
function renderDomainTabs(){
  const c = document.getElementById('domainTabs');
  c.innerHTML = Object.keys(DOMAINS).map(d=>{
    const done = domainState[d] && domainState[d].history.length>0;
    return `<button class="domain-pill ${d===currentDomain?'active':''} ${done?'done':''}" data-d="${d}">${d.split(' ')[0]}</button>`;
  }).join('');
  c.querySelectorAll('button').forEach(b=>b.addEventListener('click', ()=>{
    currentDomain = b.getAttribute('data-d'); renderDomainTabs(); renderLadder();
  }));
}
function renderLadder(){
  const items = DOMAINS[currentDomain];
  const st = domainState[currentDomain];
  const c = document.getElementById('ladderCard');
  const it = items[st.idx];
  let historyHtml = st.history.map(h=>`<div class="hrow"><span>${h.label}（${ageLabel(h.age)}）</span><span class="${h.result==='pass'?'tag green':'tag red'}">${h.result==='pass'?'通過':'未通過'}</span></div>`).join('');
  c.innerHTML = `
    <div class="section-title">${currentDomain}<span class="pill" style="margin-left:8px;">小孩年齡：${ageLabel(childAgeMonths)}</span></div>
    <div class="ladder-item">
      <div class="age">對應年齡：${ageLabel(it.age)}</div>
      <div class="label">${it.label}</div>
      <div class="ladder-actions">
        <button class="pass-btn" id="passBtn">✓ 通過</button>
        <button class="fail-btn" id="failBtn">✗ 未通過</button>
      </div>
    </div>
    <div class="ladder-history">${historyHtml || '<div class="item-sub">尚未開始測試</div>'}</div>
  `;
  document.getElementById('passBtn').addEventListener('click', ()=>{
    st.history.push({label:it.label, age:it.age, result:'pass'});
    if(st.idx < items.length-1){ st.idx++; renderLadder(); }
    else { renderLadderEnd('已達該領域最高年齡項目，皆通過'); }
    renderDomainTabs();
  });
  document.getElementById('failBtn').addEventListener('click', ()=>{
    st.history.push({label:it.label, age:it.age, result:'fail'});
    if(st.idx > 0){ st.idx--; renderLadder(); }
    else { renderLadderEnd('已達該領域最低年齡項目，仍未通過'); }
    renderDomainTabs();
  });
}
function renderLadderEnd(msg){
  const c = document.getElementById('ladderCard');
  const st = domainState[currentDomain];
  let historyHtml = st.history.map(h=>`<div class="hrow"><span>${h.label}（${ageLabel(h.age)}）</span><span class="${h.result==='pass'?'tag green':'tag red'}">${h.result==='pass'?'通過':'未通過'}</span></div>`).join('');
  c.innerHTML = `<div class="section-title">${currentDomain}</div><div class="result-box">${msg}</div><div class="ladder-history">${historyHtml}</div>`;
}
function ageLabel(m){
  if(m===null||m===undefined) return '-';
  if(m<24) return `${m}個月`;
  return `${(m/12).toFixed(1)}歲`;
}
function buildObjectiveText(){
  if(childAgeMonths===null) return '（尚未進行 Objective 評估）';
  const lines = [`# Objective`, `兒童年齡：${ageLabel(childAgeMonths)}`, ''];
  Object.keys(DOMAINS).forEach(d=>{
    const st = domainState[d];
    if(!st || st.history.length===0) return;
    lines.push(`【${d}】`);
    st.history.forEach(h=> lines.push(`${h.label}（${ageLabel(h.age)}）：${h.result==='pass'?'通過':'未通過'}`));
    const lastPass = [...st.history].reverse().find(h=>h.result==='pass');
    const lastFail = [...st.history].reverse().find(h=>h.result==='fail');
    lines.push(`→ 評估結果：最高通過約 ${lastPass?ageLabel(lastPass.age):'未測得'}；最低未通過約 ${lastFail?ageLabel(lastFail.age):'無'}`);
    lines.push('');
  });
  return lines.join('\n');
}

/* ================= ASSESSMENT ================= */
const DIAGNOSES = [

  {code:"F80.9", name:"Developmental Language Disorder (DLD) 發展性語言障礙", detail:"3歲前稱Late talker（70-80%會於4歲前追趕上）；3歲後且持續存在稱DLD，語言分水嶺為4歲。需造成功能性障礙，且非由腦傷、失聰、缺乏語言暴露、IDD或ASD解釋。"},
  {code:"F80.0", name:"Speech Sound Disorder 構音障礙", detail:"4歲是重要分水嶺（90-100%說話內容應可被聽懂），8歲為語音成熟界線。需排除聽力受損、唇顎裂、口腔動作問題(舌繫帶/咬合)、智力顯著低於心理年齡、腦性麻痺/腦傷、遺傳、環境因素。"},
  {code:"F80.81", name:"Childhood Onset Fluency Disorder 口吃", detail:"說話流暢度與節奏擾亂，通常2-7歲間出現。需與發育性不流暢(2-3.5歲，低頻率<10%、無焦慮無副行為)區別。持續>6個月且有阻斷/過度用力則較可能為流暢障礙。75-80%於青春期前自行痊癒；持續到8-10歲則易變慢性。"},
  {code:"F80.82", name:"Social (Pragmatic) Communication Disorder 社交語用溝通障礙", detail:"社交、情境切換、溝通規則(輪流說話)、推論理解(間接言語)困難。需排除聽力受損、神經系統疾病、IDD、ASD（與ASD區別在於有無侷限重複行為/興趣）。通常學齡才做診斷。"},
  {code:"F84.0", name:"Autism Spectrum Disorder 自閉症類群障礙", detail:"2歲可診斷（3-5歲入園後為診斷高峰）。核心：社交溝通與社交互動缺損（社交取向、來回對話、分享興趣情感、發起社交、整合語言非語言溝通、眼神接觸等）；侷限重複的行為興趣（刻板動作、排列玩具、仿說、抗拒改變、儀式化、特殊興趣、感覺輸入異常反應等），需跨情境固著且有嚴重度。篩檢：M-CHAT-R/F、SCQ；診斷：ADOS-2、ADI-R；嚴重度：CARS-2、SRS-2。"},
  {code:"F90", name:"Attention-Deficit Hyperactivity Disorder 注意力不足過動症", detail:"4歲後才診斷(4歲前稱hyperkinetic)；症狀需於12歲前出現；17歲以上診斷條件降低。注意力不足9項中≥7項，或過動衝動9項中≥6項，至少持續6個月。評估工具：SNAP-IV、CPT、WISC-V(工作記憶/處理速度)。"},
  {code:"F81.0", name:"閱讀障礙 Dyslexia", detail:"學齡發生、持續且影響學業/日常生活。需排除認知障礙、視聽知覺障礙、神經疾患、環境不利因素、智能障礙。"},
  {code:"F81.81", name:"書寫障礙 Dysgraphia", detail:"同SLD排除條件，影響書寫/拼字之特定學習障礙。"},
  {code:"F81.2", name:"算術障礙 Dyscalculia", detail:"同SLD排除條件，影響數學/算術能力之特定學習障礙。"},
  {code:"F82", name:"Developmental Coordination Disorder 發展性協調障礙", detail:"需排除認知與神經系統器質性疾病。影響日常生活或學習。4歲以上才診斷（評估工具3.5歲後才適用）。"},
  {code:"F98", name:"Stereotyped Movement Disorder 刻板動作障礙", detail:"重複、看似驅動性、無功能性的動作行為，需影響日常功能或造成自傷風險，並排除其他神經/精神疾病解釋。"},
  {code:"F95", name:"Tic Disorder / Tourette's Disorder 妥瑞氏症/抽動障礙", detail:"不自主、突發、快速、重複的動作或聲音抽動，需符合病程與多樣性條件，排除其他物質或疾病造成。"},
  {code:"F88 / F89", name:"其他/未明示神經發展障礙", detail:"F88: 三項以下領域遲緩或廣泛說不清楚、尚未完整評估(workup)。F89: 四項領域皆遲緩。"},
];
let selectedDx = new Set();
const aBox = document.getElementById('assessmentPane');
aBox.innerHTML = `
<div class="card">
  <div class="section-title">常見診斷選單（點選展開內容，可複選加入摘要）</div>
  <div id="dxList"></div>
</div>
<div class="card">
  <div class="section-title">📑 台灣官方檢核工具連結</div>
  <div class="badge-row">
    <a class="choice-btn" href="https://health.gov.taipei/News_Content.aspx?n=890BB287E6A590F0&sms=FEDD3204A66CD37D&s=341720F573D7CFC9" target="_blank">臺北市學齡前兒童發展檢核表</a>
    <a class="choice-btn" href="https://www.hpa.gov.tw/Pages/List.aspx?nodeid=4821" target="_blank">國健署兒童發展篩檢</a>
  </div>
</div>
<div class="card">
  <div class="section-title">📝 Assessment 補充說明</div>
  <textarea id="a_notes" placeholder="額外評估意見、轉介計畫..."></textarea>
</div>
`;
function renderDxList(){
  const c = document.getElementById('dxList');
  c.innerHTML = DIAGNOSES.map((d,i)=>`
    <div class="dx-item ${selectedDx.has(i)?'selected':''}" data-i="${i}">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div><span class="dx-code">${d.code}</span><div class="item-name">${d.name}</div></div>
        <input type="checkbox" ${selectedDx.has(i)?'checked':''} data-cb="${i}" style="width:18px;height:18px;accent-color:var(--accent);">
      </div>
      <div class="dx-detail">${d.detail}</div>
    </div>`).join('');
  c.querySelectorAll('.dx-item').forEach(el=>{
    el.addEventListener('click', (e)=>{
      if(e.target.matches('input[type=checkbox]')) return;
      el.classList.toggle('expanded');
    });
  });
  c.querySelectorAll('input[data-cb]').forEach(cb=>{
    cb.addEventListener('click', (e)=>{
      e.stopPropagation();
      const i = parseInt(cb.getAttribute('data-cb'));
      if(cb.checked) selectedDx.add(i); else selectedDx.delete(i);
      renderDxList();
    });
  });
}
renderDxList();
function buildAssessmentText(){
  const lines = [`# Assessment`];
  if(selectedDx.size===0){ lines.push('（尚未選擇診斷）'); }
  Array.from(selectedDx).sort((a,b)=>a-b).forEach(i=>{
    const d = DIAGNOSES[i];
    lines.push(`${d.code} ${d.name}`);
  });
  const notes = document.getElementById('a_notes').value.trim();
  if(notes) lines.push(`\n補充：${notes}`);
  return lines.join('\n');
}
