<!DOCTYPE html>
<html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>功能量表計分器 | 復健科臨床工具</title>
<link rel="stylesheet" href="style.css"></head>
<body><div class="wrap">
<a class="back" href="index.html">← 回工具箱首頁</a>
<h1>📊 功能量表計分器 7 合 1</h1>
<div class="sub">QuickDASH · KOOS · HOOS · WOMAC · ODI · NDI · LEFS — 依官方計分公式換算</div>
<div class="disclaimer">⚠️ 本工具僅提供「計分公式換算」，不含完整官方題目文字（題目版權屬原作者）。請使用您院內授權之正式量表本逐題詢問病人，再將「已作答題數」與「分數總和」輸入此工具計算標準化分數。</div>

<div class="card">
  <div class="section-title">選擇量表</div>
  <div class="badge-row" id="scaleTabs"></div>
</div>

<div class="card" id="calcCard"></div>

<div class="toolbar">
  <button class="action btn-primary" id="saveBtn">儲存結果</button>
  <button class="action btn-ghost" id="exportBtn">複製文字摘要</button>
</div>
<div class="saved-note" id="savedNote"></div>

<div class="card" style="display:none;" id="historyCard">
  <div class="section-title">🕓 歷史紀錄</div>
  <div id="historyList"></div>
</div>
<footer>僅供醫療教育用途 · 資料不上傳伺服器</footer>
</div>

<script src="common.js"></script>
<script>
const STORE_KEY = "outcome_scales_v1";

const SCALES = {
  quickdash: {
    label: "QuickDASH", region:"上肢功能",
    desc: "11 題，每題 1–5 分（1=無困難，5=無法執行）",
    items: 11, perMax:5, perMin:1, higherWorse:true,
    formula: (sum,n)=> ((sum/n)-1)*25,
    note: "公式：((題項平均分−1)×25)，範圍 0–100，分數越高代表失能程度越高"
  },
  koos: {
    label: "KOOS（膝）", region:"5 子量表：疼痛/症狀/日常活動/運動休閒/生活品質",
    desc: "各子量表分別輸入「已作答題數」與「分數總和」（每題 0–4 分）",
    items: null, perMax:4, perMin:0, higherWorse:false,
    formula: (sum,n)=> 100 - (sum/(n*4))*100,
    note: "公式：100 − (分數總和 ÷ (題數×4)) × 100，每個子量表分別計算，範圍 0–100，分數越高代表功能越好"
  },
  hoos: {
    label: "HOOS（髖）", region:"5 子量表：疼痛/症狀/日常活動/運動休閒/生活品質",
    desc: "各子量表分別輸入「已作答題數」與「分數總和」（每題 0–4 分）",
    items: null, perMax:4, perMin:0, higherWorse:false,
    formula: (sum,n)=> 100 - (sum/(n*4))*100,
    note: "公式與 KOOS 相同：100 − (分數總和 ÷ (題數×4)) × 100，分數越高代表功能越好"
  },
  womac: {
    label: "WOMAC", region:"3 子量表：疼痛(5題)/僵硬(2題)/功能(17題)",
    desc: "各子量表分別輸入「已作答題數」與「分數總和」（每題 0–4 分，Likert）",
    items: null, perMax:4, perMin:0, higherWorse:true,
    formula: (sum,n)=> (sum/(n*4))*100,
    note: "公式：(分數總和 ÷ (題數×4)) × 100，範圍 0–100，分數越高代表症狀/失能越嚴重"
  },
  odi: {
    label: "ODI 腰痛失能", region:"10 個面向，每項 0–5 分",
    desc: "輸入已作答題數與分數總和",
    items: 10, perMax:5, perMin:0, higherWorse:true,
    formula: (sum,n)=> (sum/(n*5))*100,
    note: "公式：(分數總和 ÷ (題數×5)) × 100。0–20%輕度 / 21–40%中度 / 41–60%重度 / 61–80%極重度 / 81–100%臥床或誇大"
  },
  ndi: {
    label: "NDI 頸部失能", region:"10 個面向，每項 0–5 分",
    desc: "輸入已作答題數與分數總和",
    items: 10, perMax:5, perMin:0, higherWorse:true,
    formula: (sum,n)=> (sum/(n*5))*100,
    note: "公式：(分數總和 ÷ (題數×5)) × 100。0–8%無失能 / 10–28%輕度 / 30–48%中度 / 50–68%重度 / 72–100%完全失能"
  },
  lefs: {
    label: "LEFS 下肢功能量表", region:"20 題，每題 0–4 分（4=無困難）",
    desc: "輸入已作答題數與分數總和（滿分 80）",
    items: 20, perMax:4, perMin:0, higherWorse:false,
    formula: (sum,n)=> sum,
    note: "總分直接相加，範圍 0–80，分數越高代表功能越好。MDC（最小可偵測變化）約 9 分"
  },
};

let current = 'quickdash';

function renderTabs(){
  const c = document.getElementById('scaleTabs');
  c.innerHTML = Object.entries(SCALES).map(([k,v])=>`<button class="choice-btn ${k===current?'active':''}" data-k="${k}">${v.label}</button>`).join('');
  c.querySelectorAll('button').forEach(b=>{
    b.addEventListener('click', ()=>{ current = b.getAttribute('data-k'); renderTabs(); renderCalc(); });
  });
}

function renderCalc(){
  const s = SCALES[current];
  const c = document.getElementById('calcCard');
  if(s.items && current !== 'koos' && current !== 'hoos' && current !== 'womac'){
    c.innerHTML = `
      <div class="section-title">${s.label}<div class="item-sub">${s.region}</div></div>
      <div class="sub">${s.desc}</div>
      <div class="grid2">
        <div><div class="item-sub">已作答題數</div><input type="number" id="nItems" value="${s.items}"></div>
        <div><div class="item-sub">分數總和</div><input type="number" id="sumScore" placeholder="0"></div>
      </div>
      <div class="result-box" id="resultBox" style="margin-top:12px;">輸入後自動計算</div>
      <div class="item-sub" style="margin-top:8px;">${s.note}</div>
    `;
    document.getElementById('nItems').addEventListener('input', computeSingle);
    document.getElementById('sumScore').addEventListener('input', computeSingle);
    computeSingle();
  } else if(current==='koos' || current==='hoos'){
    const subs = ["疼痛 Pain","症狀 Symptoms","日常活動 ADL","運動休閒 Sport/Rec","生活品質 QOL"];
    c.innerHTML = `<div class="section-title">${s.label}<div class="item-sub">${s.region}</div></div><div class="sub">${s.desc}</div>` +
      subs.map((name,i)=>`
        <div class="row">
          <div class="item-name">${name}</div>
          <div class="grid2" style="width:220px;">
            <input type="number" id="n_${i}" placeholder="題數">
            <input type="number" id="s_${i}" placeholder="總分">
          </div>
        </div>`).join('') +
      `<div class="result-box" id="resultBox" style="margin-top:12px;">輸入後自動計算</div>
       <div class="item-sub" style="margin-top:8px;">${s.note}</div>`;
    subs.forEach((_,i)=>{
      document.getElementById('n_'+i).addEventListener('input', computeMulti);
      document.getElementById('s_'+i).addEventListener('input', computeMulti);
    });
    computeMulti();
  } else if(current==='womac'){
    const subs = [{name:"疼痛 Pain（5題）", max:5},{name:"僵硬 Stiffness（2題）", max:2},{name:"功能 Function（17題）", max:17}];
    c.innerHTML = `<div class="section-title">${s.label}<div class="item-sub">${s.region}</div></div><div class="sub">${s.desc}</div>` +
      subs.map((sub,i)=>`
        <div class="row">
          <div class="item-name">${sub.name}</div>
          <div class="grid2" style="width:220px;">
            <input type="number" id="n_${i}" placeholder="題數" value="${sub.max}">
            <input type="number" id="s_${i}" placeholder="總分">
          </div>
        </div>`).join('') +
      `<div class="result-box" id="resultBox" style="margin-top:12px;">輸入後自動計算</div>
       <div class="item-sub" style="margin-top:8px;">${s.note}</div>`;
    subs.forEach((_,i)=>{
      document.getElementById('n_'+i).addEventListener('input', computeMulti);
      document.getElementById('s_'+i).addEventListener('input', computeMulti);
    });
    computeMulti();
  }
}

function computeSingle(){
  const s = SCALES[current];
  const n = parseFloat(document.getElementById('nItems').value) || 0;
  const sum = parseFloat(document.getElementById('sumScore').value) || 0;
  const box = document.getElementById('resultBox');
  if(n<=0){ box.innerHTML = '請輸入有效題數'; return; }
  const score = s.formula(sum, n);
  box.innerHTML = `<div class="result-num">${score.toFixed(1)}</div><div>${s.higherWorse?'分數越高代表失能/症狀越嚴重':'分數越高代表功能越好'}</div>`;
}

function computeMulti(){
  const s = SCALES[current];
  const box = document.getElementById('resultBox');
  const count = current==='womac' ? 3 : 5;
  let html = '';
  let valid = true;
  for(let i=0;i<count;i++){
    const n = parseFloat(document.getElementById('n_'+i).value) || 0;
    const sum = parseFloat(document.getElementById('s_'+i).value) || 0;
    if(n<=0){ valid=false; continue; }
    const score = s.formula(sum, n);
    html += `<div>子量表 ${i+1}：<b>${score.toFixed(1)}</b></div>`;
  }
  box.innerHTML = valid ? html : '請完整輸入各子量表的題數與總分';
}

function summaryText(){
  const s = SCALES[current];
  const lines = [`${s.label} 計分摘要 - ${new Date().toLocaleString('zh-TW')}`];
  lines.push(document.getElementById('resultBox').innerText.replace(/\n+/g,' / '));
  return lines.join('\n');
}

renderTabs();
renderCalc();

document.getElementById('saveBtn').addEventListener('click', ()=>{
  rtSave(STORE_KEY, summaryText());
  rtFlash(document.getElementById('savedNote'), '已儲存到本機 ✓');
  rtRenderHistory(STORE_KEY, document.getElementById('historyList'));
});
document.getElementById('exportBtn').addEventListener('click', ()=>{
  rtCopy(summaryText(), document.getElementById('savedNote'));
});
rtRenderHistory(STORE_KEY, document.getElementById('historyList'));
</script>
</body></html>
